name: monorepo-split

on:
  push:
    tags: '*'

jobs:
  split-monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_directory: packages/access-gate
            repository_name: access-gate
          - package_directory: packages/address
            repository_name: address
          - package_directory: packages/agent-bridge
            repository_name: agent-bridge
          - package_directory: packages/ai-orchestrator
            repository_name: ai-orchestrator
          - package_directory: packages/api
            repository_name: api
          - package_directory: packages/block-library
            repository_name: block-library
          - package_directory: packages/blog
            repository_name: blog
          - package_directory: packages/campaign-studio
            repository_name: campaign-studio
          - package_directory: packages/content-sections
            repository_name: content-sections
          - package_directory: packages/dashboard-reports
            repository_name: dashboard-reports
          - package_directory: packages/demo-kit
            repository_name: demo-kit
          - package_directory: packages/deployments
            repository_name: deployments
          - package_directory: packages/diagnostics
            repository_name: diagnostics
          - package_directory: packages/document-lifecycle
            repository_name: document-lifecycle
          - package_directory: packages/email-studio
            repository_name: email-studio
          - package_directory: packages/events
            repository_name: events
          - package_directory: packages/form-builder
            repository_name: form-builder
          - package_directory: packages/foundation-theme
            repository_name: foundation-theme
          - package_directory: packages/frontend-authoring
            repository_name: frontend-authoring
          - package_directory: packages/frontend-optimizer
            repository_name: frontend-optimizer
          - package_directory: packages/ga4-reports
            repository_name: ga4-reports
          - package_directory: packages/hero
            repository_name: hero
          - package_directory: packages/html-cache
            repository_name: html-cache
          - package_directory: packages/insights
            repository_name: insights
          - package_directory: packages/layout-builder
            repository_name: layout-builder
          - package_directory: packages/login-audit
            repository_name: login-audit
          - package_directory: packages/media-ai
            repository_name: media-ai
          - package_directory: packages/media-library
            repository_name: media-library
          - package_directory: packages/migration-assistant
            repository_name: migration-assistant
          - package_directory: packages/navigation
            repository_name: navigation
          - package_directory: packages/newsletter
            repository_name: newsletter
          - package_directory: packages/notes
            repository_name: notes
          - package_directory: packages/password-policy
            repository_name: password-policy
          - package_directory: packages/public-actions
            repository_name: public-actions
          - package_directory: packages/publishing-studio
            repository_name: publishing-studio
          - package_directory: packages/search
            repository_name: search
          - package_directory: packages/seo-suite
            repository_name: seo-suite
          - package_directory: packages/site-discovery
            repository_name: site-discovery
          - package_directory: packages/tags
            repository_name: tags
          - package_directory: packages/theme-agency
            repository_name: theme-agency
          - package_directory: packages/theme-corporate
            repository_name: theme-corporate
          - package_directory: packages/theme-saas
            repository_name: theme-saas
          - package_directory: packages/translation-manager
            repository_name: translation-manager
          - package_directory: packages/welcome-tour
            repository_name: welcome-tour
          - package_directory: packages/wordpress-importer
            repository_name: wordpress-importer
    steps:
      - uses: actions/checkout@v6
      - id: previous-tag
        uses: 'WyriHaximus/github-action-get-previous-tag@master'
      - name: Monorepo Split of ${{ matrix.repository_name }}
        uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: '${{ matrix.package_directory }}'
          repository_organization: 'capell-app'
          repository_name: '${{ matrix.repository_name }}'
          branch: '4.x'
          tag: ${{ steps.previous-tag.outputs.tag }}
          user_name: 'capell-app'
          user_email: 'appcapello@gmail.com'
