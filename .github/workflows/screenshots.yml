name: Screenshot Manifests

on:
  pull_request:
    branches:
      - 4.x
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/**/docs/screenshots.json'
      - 'docs/package-screenshot-manifest.json'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

jobs:
  validate-screenshot-manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Validate screenshot manifests
        run: node scripts/validate-screenshot-manifests.js
